# JVM args for the CI build runner (GitHub Actions ubuntu-latest has ~7GB RAM).
#
# IMPORTANT: the APK is built EXCLUSIVELY on GitHub Actions CI — never inside the
# low-memory dev sandbox. A previous attempt to constrain the heap to 560MB and
# run the Kotlin compiler in-process caused the compiler to OOM mid-analysis on
# CI, surfacing as:
#     KotlinFrontEndException: Exception while analyzing expression in (37,33)
# That is a memory-starvation crash of the compiler, NOT a source-code error.
# We therefore give the build a healthy heap and let the Kotlin daemon run.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.daemon=false
org.gradle.caching=true
org.gradle.configureondemand=false

android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# Give the Kotlin compiler its own daemon with enough heap so the frontend
# analysis pass never OOMs (the (37,33) KotlinFrontEndException fix).
kotlin.daemon.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
kotlin.incremental=false

# Avoid heavy R8 full-mode memory spikes
android.enableR8.fullMode=false
